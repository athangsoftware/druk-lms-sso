<ui-base-overlay [title]="'Update Permission Group'">
  <div body>
    <form class="grid grid-cols-1 gap-y-4" (submit)="onSubmit()">
      <div>
        <label class="block text-sm font-medium text-neutral-700 mb-1">Client (optional)</label>
        <select
          class="w-full px-3 py-2 text-sm border border-neutral-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
          [value]="groupModel().clientId"
          (change)="onClientChange($event)"
        >
          <option value="">— No Client —</option>
          @for (client of clients(); track client.id) {
            <option [value]="client.id">{{ client.name }}</option>
          }
        </select>
      </div>

      <app-text-input
        [label]="'Group Name'"
        [fullWidth]="true"
        [placeholder]="'e.g. User Management'"
        [formField]="groupForm.name"
      ></app-text-input>

      <app-text-input
        [label]="'Description (optional)'"
        [fullWidth]="true"
        [placeholder]="'e.g. Permissions related to user operations'"
        [formField]="groupForm.description"
      ></app-text-input>

      <div class="flex justify-center pt-2">
        <ui-button [loading]="updateGroupMutation.isLoading()" type="submit">Submit</ui-button>
      </div>
    </form>
  </div>
</ui-base-overlay>
