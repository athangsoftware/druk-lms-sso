<div class="w-full sm:px-4 h-full flex flex-col gap-4">

  <div class="flex flex-col gap-1">
    <div>
      <h1 class="text-xl font-semibold text-neutral-800">Identity Providers</h1>
    </div>
    <p class="text-sm text-neutral-600">Configure external identity providers for single sign-on.</p>
  </div>

  <!-- Table -->
  <div class="flex-1 min-h-0">
    <ui-data-table
      class="block h-full"
      [columnGroups]="columnGroups"
      [data]="providerList.value()?.data ?? []"
      [totalCount]="providerList.value()?.totalCount ?? 0"
      [hasError]="!!providerList.error()"
      [tableActions]="tableActions"
      (tableAction)="onTableAction($event)"
      (action)="onAction($event)"
      (stateChange)="onTableStateChanged($event)"
      [initialValue]="store.tableState()"
      (rowClick)="onRowClicked($event)"
    ></ui-data-table>
  </div>

</div>
