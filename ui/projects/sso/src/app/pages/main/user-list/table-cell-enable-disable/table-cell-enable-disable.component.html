<div class="flex items-center justify-center">
  @if (rowData?.isActive) {
    <svg-icon [src]="'icons/check-circle.svg'" [svgStyle]="{'width.px': 22, 'color': '#22c55e'}"></svg-icon>
  } @else {
    <svg-icon [src]="'icons/close-circle.svg'" [svgStyle]="{'width.px': 22, 'color': '#ef4444'}"></svg-icon>
  }
</div>
