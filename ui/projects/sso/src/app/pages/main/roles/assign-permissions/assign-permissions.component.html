<ui-base-overlay [title]="'Assign Permissions to ' + data.name">
  <div body>
    <div class="flex flex-col gap-4">
      <p class="text-sm text-neutral-600">Select permissions to assign to this role.</p>

      <input
        type="text"
        class="w-full px-3 py-2 text-sm border border-neutral-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
        placeholder="Search permissions..."
        [value]="searchTerm()"
        (input)="searchTerm.set($any($event.target).value)"
      />

      <div class="max-h-96 overflow-y-auto border border-neutral-200 rounded-lg">
        @for (group of groupedPermissions(); track group.name) {
          <!-- Group Header -->
          <div class="sticky top-0 z-10 bg-neutral-50 border-b border-neutral-200 px-4 py-2.5 flex items-center justify-between">
            <label class="flex items-center gap-3 cursor-pointer">
              <input
                type="checkbox"
                class="h-4 w-4 rounded border-neutral-300 text-blue-600 focus:ring-blue-500"
                [checked]="isGroupAllSelected(group)"
                [indeterminate]="isGroupPartiallySelected(group)"
                (change)="toggleGroup(group)"
              />
              <span class="text-sm font-semibold text-neutral-700">{{ group.name }}</span>
            </label>
            <span class="text-xs text-neutral-500">
              {{ groupSelectedCount(group) }}/{{ group.permissions.length }}
            </span>
          </div>

          <!-- Group Permissions -->
          <div class="divide-y divide-neutral-100">
            @for (permission of group.permissions; track permission.id) {
              <label class="flex items-center gap-3 px-4 py-2.5 pl-10 hover:bg-neutral-50 cursor-pointer">
                <input
                  type="checkbox"
                  class="h-4 w-4 rounded border-neutral-300 text-blue-600 focus:ring-blue-500"
                  [checked]="isSelected(permission.id)"
                  (change)="togglePermission(permission.id)"
                />
                <span class="text-sm text-neutral-800">
                  {{ permission.resourceName }}:{{ permission.actionName }}
                </span>
              </label>
            }
          </div>
        }
      </div>

      <div class="flex justify-center pt-2">
        <ui-button [loading]="assignMutation.isLoading()" type="button" (click)="onSubmit()">Save</ui-button>
      </div>
    </div>
  </div>
</ui-base-overlay>
