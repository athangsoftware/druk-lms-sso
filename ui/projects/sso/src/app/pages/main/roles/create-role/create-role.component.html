<ui-base-overlay [title]="'Create Role'">
  <div body>
    <form class="grid grid-cols-1 md:grid-cols-2 gap-x-4 gap-y-4" (submit)="onSubmit()">
      <app-text-input
        [label]="'Role Name'"
        [fullWidth]="true"
        [placeholder]="'e.g. ADMIN'"
        [formField]="roleForm.name"
      ></app-text-input>

      <app-single-selection-field
        [title]="'Parent Role (optional)'"
        [items]="parentRoleOptions"
        [display]="'name'"
        [value]="'id'"
        [formField]="roleForm.parentRoleId"
      ></app-single-selection-field>

      <div class="md:col-span-2 flex justify-center pt-2">
        <ui-button [loading]="createRoleMutation.isLoading()" type="submit">Submit</ui-button>
      </div>
    </form>
  </div>
</ui-base-overlay>
