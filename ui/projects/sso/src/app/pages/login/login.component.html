<div class="h-screen w-full overflow-hidden">
  <div class="flex flex-col lg:flex-row h-full">
    <!-- Left Brand Section -->
    <div class="w-full lg:w-1/2 bg-gradient-to-br from-orange-500 via-orange-600 to-orange-700 p-8 lg:p-16 flex items-center justify-center relative overflow-hidden">
      <!-- Animated Background Elements -->
      <div class="absolute inset-0 opacity-20">
        <div class="absolute top-32 left-32 w-40 h-40 bg-white rounded-full blur-xl animate-pulse"></div>
        <div class="absolute bottom-32 right-32 w-60 h-60 bg-white rounded-full blur-2xl animate-pulse"></div>
        <div class="absolute top-1/3 left-1/4 w-32 h-32 bg-white rounded-full blur-lg animate-pulse"></div>
        <div class="absolute bottom-1/3 right-1/4 w-28 h-28 bg-white rounded-full blur-lg animate-pulse"></div>
      </div>

      <!-- Brand Content -->
      <div class="relative z-10 text-center max-w-lg">
        <div class="flex items-center justify-center mb-8">
          <img src="logo/ra_logo.png" alt="GovTech" class="h-12 w-auto brightness-0 invert opacity-90 drop-shadow-md" />
        </div>
        <p class="text-blue-100 text-xl lg:text-2xl leading-relaxed mb-8">
          Secure access to all your applications with a single sign-on experience
        </p>
      </div>
    </div>

    <!-- Right Login Form Section -->
    <div class="w-full lg:w-1/2 bg-white p-8 lg:p-16 flex items-center justify-center">
      <div class="w-full max-w-lg">
        <!-- Header -->
        <div class="text-center mb-10">
        
          <h2 class="text-4xl lg:text-5xl font-bold text-gray-900 mb-3 bg-gradient-to-r from-orange-500 to-orange-700 bg-clip-text text-transparent">Welcome Back</h2>
          <p class="text-gray-600 text-lg">Sign in to your account</p>
        </div>

        <!-- Login Form -->
        <form (submit)="onSubmit($event)" class="space-y-8">
          <div>
            <app-text-input
              [fullWidth]="true"
              label="Username"
              [placeholder]="'Enter your username'"
              [formField]="loginForm.username">
            </app-text-input>
          </div>
          <div>
            <app-text-input
              type="password"
              label="Password"
              [fullWidth]="true"
              [placeholder]="'Enter your password'"
              [formField]="loginForm.password">
            </app-text-input>
          </div>
          <div>
            <ui-button
              [loading]="loginMutation.isLoading()"
              type="submit"
              [fullWidth]="true"
              appearance="primary"
              size="lg">
              Sign In
            </ui-button>
          </div>
        </form>

        <!-- Divider -->
        @if (enabledProviders().length > 0) {
        <div class="relative my-10">
          <div class="absolute inset-0 flex items-center">
            <div class="w-full border-t border-gray-200"></div>
          </div>
          <div class="relative flex justify-center">
            <span class="px-6 bg-white text-gray-500 font-medium text-base">Or continue with</span>
          </div>
        </div>

        <!-- Social Login Buttons -->
        <div class="grid gap-6" [class]="enabledProviders().length === 1 ? 'grid-cols-1' : 'grid-cols-2'">
          @for (provider of enabledProviders(); track provider.id) {
          <button
            (click)="loginWithProvider(provider)"
            class="flex items-center justify-center px-6 py-4 border border-gray-300 rounded-xl bg-white text-gray-700 hover:bg-gray-50 hover:border-gray-400 transition-colors duration-200 shadow-sm hover:shadow-md group"
            [title]="'Sign in with ' + provider.name">
            @if (provider.iconUrl) {
            <img [src]="provider.iconUrl" [alt]="provider.name" class="w-6 h-6 mr-3 rounded-sm" />
            }
            <span class="font-medium">{{ provider.name }}</span>
          </button>
          }
        </div>
        }
      </div>
    </div>
  </div>
</div>
