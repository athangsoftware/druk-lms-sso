<div class="container max-w-md mx-auto p-4 text-center bg-gradient-to-b">
  <!-- Header -->
  <img class="bg-black px-3 py-2 m-3 rounded-lg" src="icons/ndi-logo.svg" alt="NDI Logo" />

  <!-- Error Message -->
  @if (error()) {
    <p class="text-red-600 text-lg font-medium">{{ error() }}</p>
  }

  <!-- QR Code Section -->
  @if (proofRequest()) {
    <div class="flex justify-center">
      <qrcode
        [qrdata]="proofRequest()!.data?.proofRequestURL"
        [width]="200"
        [errorCorrectionLevel]="'M'"
        class="bg-green-200 border-4 border-green-200 rounded-lg shadow-sm"
      ></qrcode>
    </div>
  } @else {
    <div class="flex justify-center">
      <div class="bg-gradient-to-br from-green-200 to-green-400 border-4 border-green-200 rounded-lg shadow-sm w-[200px] h-[200px] flex items-center justify-center">
        <svg class="w-12 h-12 text-green-600 animate-spin" fill="none" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
          <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
        </svg>
      </div>
    </div>
    <p class="text-gray-600 text-lg font-medium">Generating QR...</p>
  }

  <!-- Instructions -->
  <div class="text-gray-700 text-base md:text-lg space-y-1 mb-8 mt-2">
    <p>1. Open <span class="font-semibold text-green-600">Bhutan NDI Wallet</span> on your phone</p>
    <p>2. Tap the <span class="font-semibold">Scan</span> button in the menu and capture the code <span class="text-green-500">📷</span></p>
  </div>

  <!-- App Store Badges -->
  <p class="text-gray-500 text-sm mt-4">Download Now</p>
  <div class="flex justify-center space-x-6">
    <a href="https://play.google.com/store/apps/details?id=com.bhutanndi" target="_blank" class="flex items-center transform hover:scale-110 transition-transform duration-200">
      <img src="https://upload.wikimedia.org/wikipedia/commons/7/78/Google_Play_Store_badge_EN.svg" alt="Google Play" class="h-10" />
    </a>
    <a href="https://apps.apple.com/app/bhutan-ndi/id6476185498" target="_blank" class="flex items-center transform hover:scale-110 transition-transform duration-200">
      <img src="https://developer.apple.com/assets/elements/badges/download-on-the-app-store.svg" alt="App Store" class="h-10" />
    </a>
  </div>
</div>
