<!-- date-range-input.component.html -->
<ui-base-input #inputElement [width]="width()" [title]="label()" [isRequiredField]="hasRequiredValidator()">
  <!-- Input Slot -->
  <div input #inputContainer (click)="onDatePickerIconClicked()"
    class="relative flex items-center w-full bg-white transition-all cursor-pointer"
    [ngClass]="borderless() ? '' : 'border border-gray-300 rounded-md shadow-sm ring-1 ring-gray-300 focus-within:ring-2 focus-within:ring-primary-400 focus-within:border-primary-400'"
    [class.border-red-500]="!borderless() && hasErrors()" [class.ring-red-500]="!borderless() && hasErrors()"
    [class.focus-within:ring-red-500]="!borderless() && hasErrors()"
    [class.focus-within:border-red-500]="!borderless() && hasErrors()" [class.opacity-60]="isDisabled()">
    @if (iconSrc()) {
    <ui-svg-icon [size]="18" [src]="iconSrc()!"
      class="absolute pointer-events-none ml-3 text-neutral-400"></ui-svg-icon>
    }

    <div class="flex items-center w-full bg-transparent border-none rounded-md" [ngClass]="sizeClasses()"
      [class.pr-7]="showDatePickerIcon()">
      <!-- Display selected range -->
      @if (value()?.startDate) {
      <div
        class="flex items-center gap-1 bg-primary-100 text-primary-900 text-sm px-2 py-1 rounded-full max-w-full overflow-hidden">
        <span class="truncate cursor-default">{{
          formatDateRange(value())
          }}</span>
        @if (value()?.endDate) {
        <button (click)="$event.stopPropagation(); clearRange()"
          class="text-error-500 hover:text-error-700 flex-shrink-0 cursor-pointer flex items-center justify-center">
          <svg class="w-4 h-4" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none">
            <path d="M6 18L18 6M6 6l12 12" stroke="currentColor" stroke-width="2" />
          </svg>
        </button>
        }
      </div>
      }

      <!-- Input wrapper, only shown when no date is selected -->
      @if (!value()?.startDate) {
      <div class="relative flex-1 min-w-[120px]">
        <input readonly
          class="w-full h-[30px] placeholder-neutral-400 text-black border-none outline-none bg-transparent cursor-default focus:ring-0"
          [class.text-neutral-400]="isDisabled()" [class.disabled-placeholder]="isDisabled()" [value]="textInputValue()"
          (focus)="onFocus()" [ngClass]="getClass()" [placeholder]="placeHolder" (blur)="onBlur()"
          style="outline: none !important; box-shadow: none !important;">
      </div>
      }

      <!-- Date picker icon, with dynamic positioning -->
      @if (showDatePickerIcon()) {
      <div #trigger (click)="$event.stopPropagation(); onDatePickerIconClicked()"
        class="absolute right-6 hover:bg-neutral-100 rounded-full z-20 cursor-pointer transition-colors">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
          class="w-[18px] h-[18px] text-neutral-400 hover:text-primary-500 transition-colors">
          <path
            d="M19 19H5V8H19M16 1V3H8V1H6V3H5C3.89 3 3 3.89 3 5V19C3 19.5304 3.21071 20.0391 3.58579 20.4142C3.96086 20.7893 4.46957 21 5 21H19C19.5304 21 20.0391 20.7893 20.4142 20.4142C20.7893 20.0391 21 19.5304 21 19V5C21 3.89 20.1 3 19 3H18V1M17 12H12V17H17V12Z"
            fill="currentColor" />
        </svg>
      </div>
      }
    </div>
  </div>

  <!-- Error Slot -->
  @if (hasErrors()) {
  <div error class="ml-2 text-left">
    <span class="text-xs text-red-500">{{ errorMessage() }}</span>
  </div>
  } @else if (showErrorSpace()) {
  <div error class="text-left">
    <span class="text-xs text-transparent">.</span>
  </div>
  }
</ui-base-input>
