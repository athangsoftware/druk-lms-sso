<div class="max-h-[200px] overflow-y-auto flex flex-col gap-0.5">
    @for (option of data.options; track option.value) {
    <button type="button" (click)="select(option.value)"
        class="w-full text-left px-3 py-2 text-sm cursor-pointer transition-all duration-200 focus:outline-none flex items-center gap-2"
        [class.bg-green-50]="data.currentValue === option.value"
        [class.text-green-700]="data.currentValue === option.value"
        [class.font-medium]="data.currentValue === option.value"
        [class.text-gray-700]="data.currentValue !== option.value"
        [class.hover:bg-gray-50]="data.currentValue !== option.value">

        @if (option.icon) {
        <span class="text-base leading-none" [class.font-bold]="data.currentValue === option.value">{{ option.icon
            }}</span>
        }

        <span [class.font-medium]="data.currentValue === option.value">{{ option.label }}</span>

        @if (option.fullName) {
        <span class="ml-auto text-xs text-gray-500" [class.text-green-600]="data.currentValue === option.value">{{
            option.fullName }}</span>
        }
    </button>
    }
</div>
