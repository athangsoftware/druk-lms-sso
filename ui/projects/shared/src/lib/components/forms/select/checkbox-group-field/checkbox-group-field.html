<ui-base-input [title]="label()" [width]="width()" [isRequiredField]="hasRequiredValidator()">
  <div input class="flex flex-row flex-wrap gap-3" [ngClass]="containerClass()">
    @for (item of visibleItems(); track item; let index = $index) {
    <label class="flex items-center gap-2 p-2 rounded-md border cursor-pointer transition-all bg-white" [ngClass]="{
          'border-primary-500 bg-primary-50': isSelected()(item) && !hasErrors(),
          'border-red-500': hasErrors(),
          'border-gray-300 hover:bg-gray-50': !isSelected()(item) && !hasErrors(),
          'bg-gray-100 cursor-not-allowed': isDisabled()
        }" [attr.aria-selected]="isSelected()(item)" [attr.aria-label]="displayText()(item)">
      <input type="checkbox" [value]="getValueId(item)" [checked]="isSelected()(item)" [disabled]="isDisabled()"
        (change)="onItemClicked(item)"
        class="h-4 w-4 accent-primary-600 focus:ring-primary-500 disabled:accent-gray-400 disabled:opacity-60" />

      @if (icon()(item)) {
      @switch (iconType()(item)) {
      @case ('url') {
      <img class="h-5 w-5 object-contain flex-shrink-0" [src]="icon()(item)"
        [alt]="displayText()(item) || 'Item icon'" />
      }
      @case ('svg') {
      <ui-svg-icon [src]="icon()(item)!" [size]="18" [ngStyle]="{'color': itemIconColor()(item)}"
        class="flex-shrink-0" />
      }
      }
      }

      <span class="text-sm text-gray-900 whitespace-nowrap" [ngClass]="{ 'text-gray-400': isDisabled() }">
        {{ displayText()(item) }}
      </span>
    </label>
    }

    @if (showMore()) {
    <button type="button" (click)="showAllItems()"
      class="flex items-center justify-center rounded-md px-3 py-2 text-sm font-medium border border-dashed transition-all"
      [ngClass]="{
          'border-primary-500 text-primary-500 hover:bg-primary-50': !hasErrors() && !isDisabled(),
          'border-red-500 text-red-500': hasErrors(),
          'border-gray-300 text-gray-400 cursor-not-allowed': isDisabled()
        }">
      More
    </button>
    }

    @if (showLess()) {
    <button type="button" (click)="shrinkItems()"
      class="flex items-center justify-center rounded-md px-3 py-2 text-sm font-medium border border-dashed transition-all"
      [ngClass]="{
          'border-primary-500 text-primary-500 hover:bg-primary-50': !hasErrors() && !isDisabled(),
          'border-red-500 text-red-500': hasErrors(),
          'border-gray-300 text-gray-400 cursor-not-allowed': isDisabled()
        }">
      Less
    </button>
    }

    @if (customActionText()) {
    <button type="button" (click)="onCustomActionClick()"
      class="flex items-center justify-center rounded-md px-3 py-2 text-sm font-medium transition-all" [ngClass]="{
          'bg-primary-500 text-white hover:bg-primary-600': !isDisabled(),
          'bg-gray-200 text-gray-400 cursor-not-allowed': isDisabled()
        }">
      {{ customActionText() }}
    </button>
    }

    @if (options().length <= 0 && emptyMessage()) { <p class="text-sm text-red-700 w-full">{{ emptyMessage() }}</p>
      }
  </div>

  <div error>
    @if (hasErrors()) {
    <p class="text-sm text-red-500 mt-1">
      {{ errorMessage() }}
    </p>
    } @else if (showErrorSpace()) {
    <p class="text-sm text-transparent mt-1">.</p>
    }
  </div>
</ui-base-input>
