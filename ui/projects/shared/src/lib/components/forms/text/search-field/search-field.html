<ui-base-input #inputElement [title]="label()" [width]="width()" [isRequiredField]="hasRequiredValidator()"
  [compact]="!showErrorSpace()">
  <!-- Input Slot -->
  <div input
    class="relative flex items-center w-full bg-white border border-gray-300 rounded-md shadow-sm ring-1 ring-gray-300 focus-within:ring-2 focus-within:ring-primary-400 focus-within:border-primary-400 transition-all"
    [class.border-red-500]="hasErrors()" [class.ring-red-500]="hasErrors()"
    [class.focus-within:ring-red-500]="hasErrors()" [class.focus-within:border-red-500]="hasErrors()"
    [class.opacity-60]="isDisabled()">
    <!-- Search Icon -->
    <svg class="w-6 h-6 mx-2 text-gray-400" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" width="24" height="24"
      fill="none" viewBox="0 0 24 24">
      <path stroke="currentColor" stroke-linecap="round" stroke-width="2"
        d="m21 21-3.5-3.5M17 10a7 7 0 1 1-14 0 7 7 0 0 1 14 0Z" />
    </svg>

    <!-- Input Field -->
    <div class="relative flex items-center flex-1">
      @if (field()) {
      <!-- Signal Forms mode -->
      <input [formField]="field()!" uiAutofocus
        class="flex-1 bg-transparent border-none outline-none placeholder-gray-400 text-gray-600 focus:ring-0"
        [ngClass]="sizeClasses()" [class.text-gray-400]="isDisabled()" type="text" [placeholder]="placeholder()"
        (focus)="onFocus()" (blur)="onBlur()" style="outline: none !important; box-shadow: none !important;">
      } @else {
      <!-- Traditional mode (backward compatibility) -->
      <input (input)="onInput($any($event.target)?.value)"
        class="flex-1 bg-transparent border-none outline-none placeholder-gray-400 text-gray-600 focus:ring-0"
        [ngClass]="sizeClasses()" [class.text-gray-400]="isDisabled()" type="text" [placeholder]="placeholder()"
        (focus)="onFocus()" (blur)="onBlur()" style="outline: none !important; box-shadow: none !important;">
      }
    </div>
  </div>

  <!-- Error Slot -->
  @if (hasErrors()) {
  <div error class="ml-2 text-left">
    <span class="text-xs text-red-500">{{ errorMessage() }}</span>
  </div>
  } @else if (showErrorSpace()) {
  <div error class="text-left">
    <span class="text-xs text-transparent">.</span>
  </div>
  }
</ui-base-input>
