<ui-base-input [title]="label()" [width]="width()" [isRequiredField]="hasRequiredValidator()">
  <!-- Input Slot -->
  <div input
    class="relative flex items-center w-full bg-white border border-neutral-200 rounded-md shadow-sm focus-within:ring-2 focus-within:ring-primary-400 transition-all"
    [class.border-red-500]="hasErrors()" [class.ring-red-500]="hasErrors()"
    [class.focus-within:ring-red-500]="hasErrors()" [class.focus-within:border-red-500]="hasErrors()"
    [class.opacity-60]="isDisabled()">
    <!-- Prefix Select -->
    @if (hasPrefixSelect()) {
    <div class="relative">
      <button #prefixButton type="button" (click)="onTogglePrefixDropdown()"
        class="pl-3 pr-6 bg-transparent border-0 text-primary-800 focus:outline-none cursor-pointer font-medium"
        [ngClass]="sizeClasses()" [attr.aria-label]="'Prefix selection for ' + (label() || 'number input')"
        [disabled]="isDisabled()">
        {{ selectedPrefixLabel() }}
      </button>
      <div class="absolute inset-y-0 right-2 flex items-center pointer-events-none">
        <svg class="w-3 h-3 text-primary-800 transition-transform duration-200"
          [ngClass]="{ 'rotate-180': isPrefixDropdownOpen() }" fill="none" stroke="currentColor" viewBox="0 0 24 24"
          xmlns="http://www.w3.org/2000/svg">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path>
        </svg>
      </div>
    </div>
    <div class="h-4 w-px bg-neutral-200 mx-1"></div>
    }

    <!-- Input Field(s) -->
    <div class="relative flex items-center flex-1 gap-2">
      @if (iconSrc()) {
      <ui-svg-icon [size]="18" [src]="iconSrc()!"
        class="absolute ml-3 text-neutral-400 pointer-events-none"></ui-svg-icon>
      }
      @if (isRange()) {
      <!-- Range Input (From - To) -->
      <input [value]="fromValue()" (input)="onFromInput($event)" type="number" [placeholder]="'Min'" (focus)="onFocus()"
        (blur)="onBlur()"
        class="w-14 bg-transparent border-none outline-none placeholder-neutral-400 text-black focus:border-none"
        [ngClass]="sizeClasses()" [class.pl-10]="iconSrc()" [class.pl-3]="!iconSrc()" [disabled]="isDisabled()"
        [class.text-neutral-400]="isDisabled()" [class.disabled-placeholder]="isDisabled()">
      <input [value]="toValue()" (input)="onToInput($event)" type="number" [placeholder]="'Max'" (focus)="onFocus()"
        (blur)="onBlur()"
        class="w-14 bg-transparent border-none outline-none placeholder-neutral-400 text-black focus:border-none"
        [ngClass]="sizeClasses()" [class.pl-3]="true" [disabled]="isDisabled()" [class.text-neutral-400]="isDisabled()"
        [class.disabled-placeholder]="isDisabled()">
      } @else {
      <!-- Single Number Input -->
      <input [value]="singleValue()" (input)="onSingleInput($event)" type="number" [placeholder]="placeholder()"
        (focus)="onFocus()" (blur)="onBlur()"
        class="flex-1 bg-transparent border-none outline-none placeholder-neutral-400 text-black focus:border-none"
        [ngClass]="sizeClasses()" [class.pl-10]="iconSrc()" [class.pl-3]="!iconSrc()" [disabled]="isDisabled()"
        [class.text-neutral-400]="isDisabled()" [class.disabled-placeholder]="isDisabled()">
      }
    </div>
  </div>

  <!-- Error Slot -->
  @if (hasErrors()) {
  <div error class="mt-1">
    <span class="text-caption text-red-500">
      {{ errorMessage() }}
    </span>
  </div>
  } @else if (showErrorSpace()) {
  <div error class="mt-1">
    <span class="text-caption text-transparent">.</span>
  </div>
  }
</ui-base-input>
