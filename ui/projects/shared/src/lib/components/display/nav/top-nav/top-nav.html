<div class="relative max-w-full">
  <!-- Top Navigation Bar -->
  <nav class="flex items-center justify-between gap-1 max-w-full" [class]="navClasses()">
    <!-- Left section: Toggle button + Logo -->
    <div class="flex items-center gap-1 sm:gap-4 min-w-0 overflow-hidden h-full">
      <!-- Hamburger Menu Toggle for Side Nav (Mobile Only) -->
      @if (isMobile()) {
      <button class="p-2 rounded-full hover:bg-primary-600 transition-all duration-200 focus:outline-none flex-shrink-0"
        (click)="onToggleSideNav()" [attr.aria-label]="isExpanded() ? 'Close sidebar' : 'Open sidebar'">
        <svg class="w-5 h-5 transition-transform duration-300 text-white" fill="none" stroke="currentColor"
          viewBox="0 0 24 24">
          @if (isExpanded()) {
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
          } @else {
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
          }
        </svg>
      </button>
      }

      <!-- Logo -->
      @if (showLogo()) {
      <div class="min-w-0 overflow-hidden flex items-center h-full">
        <ng-content select="[logo]"></ng-content>
      </div>
      }
    </div>

    <!-- Right-aligned section for actions -->
    <div class="flex items-center gap-2 sm:gap-4 flex-shrink-0 h-full">
      <div class="flex items-center h-full">
        <ng-content select="[actions]"></ng-content>
      </div>
    </div>
  </nav>
</div>
