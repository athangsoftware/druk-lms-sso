<div class="base-input-root flex flex-col" [ngClass]="widthClass()">
  @if (title()) {
    <label class="block text-sm font-medium text-gray-700 mb-1" data-ui-title>
      {{ title() }}
      @if (isRequiredField()) {
        <span class="text-red-500">*</span>
      }
    </label>
  }
  <ng-content select="[input]"></ng-content>
  @if (!compact()) {
    <div class="base-input-error" data-ui-error>
      <ng-content select="[error]"></ng-content>
    </div>
  }
  <ng-content select="[icon]"></ng-content>
</div>
